name: Scan External Repository

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to scan (owner/repo)"
        required: true
      branch:
        description: "Branch"
        default: "main"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout scanner
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo }}
          ref: ${{ github.event.inputs.branch }}
          path: target-repo

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run SAST
        run: |
          python cli.py target-repo --json report.json

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fail if vulnerabilities found
        run: |
          echo "Analyzing report..."

          count=$(jq '.issues_detected' report.json)

          echo "Issues detected: $count"

          if [ "$count" -eq 0 ]; then
            echo "Clean repo ✅"
          else
            echo "Vulnerabilities found ❌"
            exit 1
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: report.json
